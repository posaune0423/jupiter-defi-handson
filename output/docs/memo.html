<p>ちょっとおさらい</p>
<ul>
<li>AMM</li>
<li>既存金融とDefiの違い</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" lang="ja-JP">
<h2 id="aggregator">Aggregator</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" lang="ja-JP">
<p>既存金融でいう<strong>SOR(Smart Order Router)</strong></p>
<p>Blockchain上にはDEXと呼ばれる取引所が沢山存在している。</p>
<p>それらを1つのInterfaceで呼べるようにしたもので、さらに最適な交換レートのrouteを探索してくれる</p>
<ul>
<li>Jupiter</li>
<li>1inch</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" lang="ja-JP">
<p>一般のAMMだけじゃなくprop AMMやRFQ等のmarket makerからのquoteも受け付けてbest rateをuserに提示る</p>
<p>既存金融とかだと [[立会外取引]]みたいなもの</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" lang="ja-JP">
<p>A. Direct Route</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>SOL -&gt; USDC
</code></pre>
<p>B. Multi-hop Route</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>SOL -&gt; USDT -&gt; USDC
SOL -&gt; mSOL -&gt; USDC
SOL -&gt; JupSOL -&gt; USDC
</code></pre>
<p>C. Split Route</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>SOL -&gt; USDC  40% via Jupiter
SOL -&gt; USDC  35% via Raydium
SOL -&gt; USDT -&gt; USDC 25% via Meteora + Orca
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="ja-JP">
<p>Jupiter Swapとかを見てみる</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="ja-JP">
<h2 id="perpetual">Perpetual</h2>
<p>まずそもそもperpとは？ =&gt;「永久先物」</p>
<p>永久(perpetual) 先物(future)</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="ja-JP">
<p>そもそも「先物取引」とは？ =&gt;<br />
将来の決まった日時・条件で、あらかじめ決めた価格で売買する約束を、今の時点で取り交わす取引</p>
<p>何をするか:<br />
「将来、この価格で買う／売る」という契約を売買する（多くの市場では、最終的に現物を受け取るのではなく、価格差の精算で決済される形が一般的）。<br />
なぜあるか:<br />
農産物やエネルギーなどで生まれた「将来の価格が読めない」リスクを、先物でヘッジ（価格を固定する）するため。投資・投機のために価格変動に乗る用途もある。<br />
レバレッジ:<br />
証拠金の一部で大きなノーション（想定元本）に張れることが多い。その分、利益も損失も拡大し、証拠金維持率を下回るとロスカットなどで強制決済されうる。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="ja-JP">
<p>小話</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>米国の先物市場は1840年代にシカゴではじまりました。

シカゴは米国中西部の穀倉地帯の中央に位置していたことと、五大湖や鉄道を通じて穀物を集積、配送する交通の要所であったため、シカゴが先物取引の中心になったとされています。
</code></pre>
<p>日本も米相場で先物取引が盛んだった</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>江戸時代に本間宗久という相場師がロウソク足を発明したという説もある
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" lang="ja-JP">
<p>要はレバレッジとかを使える信用取引とかができる。<br />
その上で現物価格との乖離は<strong>Funding Rate</strong>という概念で防ぐ</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="ja-JP">
<h3 id="funding-rate">Funding Rate</h3>
<p>Perp Price &gt; Spot Price<br />
Long =&gt; Short<br />
Perp Price &lt; Spot Price<br />
Short Long</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" lang="ja-JP">
<h3 id="liqudation">Liqudation</h3>
<p>清算、FXなどと違って追証(おいしょう)のようなものはなくEquity(口座残高)がMaintenance Marginを下回っていたら強制清算</p>
<p>取引所にもよるが</p>
