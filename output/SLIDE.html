<h1 id="part-1">Part 1</h1>
<h2 id="aggregator">Aggregator</h2>
<p>複数の DEX から最適なスワップ経路を探し、一つの画面や API で扱うレイヤー。</p>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-background-image="url(./assets/bg.png)" data-footer=" " data-header="Aggregator" data-theme="jupiter" data-style="@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');" lang="en-US" style="--background-image:url(./assets/bg.png);--footer: ;--header:Aggregator;--theme:jupiter;--style:@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');;background-image:url(./assets/bg.png);background-position:center;background-repeat:no-repeat;background-size:cover;">
<header>Aggregator</header>

<h2 id="%E6%97%A2%E5%AD%98%E9%87%91%E8%9E%8D%E3%81%A7%E3%81%84%E3%81%86-sor">既存金融でいう SOR</h2>
<p><strong>SOR（Smart Order Router）</strong> に相当する発想。</p>
<p>Blockchain 上には DEX と呼ばれる取引所が沢山存在している。</p>
<p>それらを <strong>1つの Interface</strong> で呼べるようにしたもので、さらに最適な交換レートの<br />
<strong>route</strong> を探索してくれる。</p>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-background-image="url(./assets/bg.png)" data-footer=" " data-header="Aggregator" data-theme="jupiter" data-style="@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');" lang="en-US" style="--background-image:url(./assets/bg.png);--footer: ;--header:Aggregator;--theme:jupiter;--style:@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');;background-image:url(./assets/bg.png);background-position:center;background-repeat:no-repeat;background-size:cover;">
<header>Aggregator</header>

<h2 id="%E4%BB%A3%E8%A1%A8%E4%BE%8B">代表例</h2>
<div class="brand-row">
<div class="brand-item">
<img src="assets/logos/jupiter.svg" alt="Jupiter" class="brand-logo" />
<div class="brand-meta">
<h4>Jupiter</h4>
<p>Solana でよく使われる入口の一例。</p>
</div>
</div>
<div class="brand-item">
<img src="assets/logos/1inch.svg" alt="1inch" class="brand-logo" />
<div class="brand-meta">
<h4>1inch</h4>
<p>Ethereum 側でも名前が挙がりやすい一例。</p>
</div>
</div>
</div>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-background-image="url(./assets/bg.png)" data-footer=" " data-header="Aggregator" data-theme="jupiter" data-style="@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');" lang="en-US" style="--background-image:url(./assets/bg.png);--footer: ;--header:Aggregator;--theme:jupiter;--style:@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');;background-image:url(./assets/bg.png);background-position:center;background-repeat:no-repeat;background-size:cover;">
<header>Aggregator</header>

<h2 id="amm-%E4%BB%A5%E5%A4%96%E3%82%82%E6%9D%9F%E3%81%AD%E3%82%8B">AMM 以外も束ねる</h2>
<p class="lede-line">一般の AMM だけでなく、<strong>prop AMM</strong> や <strong>RFQ</strong> といった市場メーカーの見積もりも束ねて、ユーザーに実効レートの良い選択肢を出す。</p>
<p class="sub-text">既存金融でいえば、取引所の場内だけでなく <strong>立会外取引</strong> に近い流動性も混ざり得る、という理解。</p>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-background-image="url(./assets/bg.png)" data-footer=" " data-header="Aggregator" data-theme="jupiter" data-style="@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');" lang="en-US" style="--background-image:url(./assets/bg.png);--footer: ;--header:Aggregator;--theme:jupiter;--style:@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');;background-image:url(./assets/bg.png);background-position:center;background-repeat:no-repeat;background-size:cover;">
<header>Aggregator</header>

<h2 id="a-direct-route">A. Direct Route</h2>
<div class="route-pre-wrap">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>SOL -&gt; USDC
</code></pre>
</div>
<p class="sub-text">1つのプールで完結する一番シンプルな経路。</p>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-background-image="url(./assets/bg.png)" data-footer=" " data-header="Aggregator" data-theme="jupiter" data-style="@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');" lang="en-US" style="--background-image:url(./assets/bg.png);--footer: ;--header:Aggregator;--theme:jupiter;--style:@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');;background-image:url(./assets/bg.png);background-position:center;background-repeat:no-repeat;background-size:cover;">
<header>Aggregator</header>

<h2 id="b-multi-hop-route">B. Multi-hop Route</h2>
<div class="route-pre-wrap">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>SOL -&gt; USDT -&gt; USDC
SOL -&gt; mSOL -&gt; USDC
SOL -&gt; JupSOL -&gt; USDC
</code></pre>
</div>
<p class="sub-text">直接のプールより、中間トークンを経由したほうが実効レートが良い場合がある。</p>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-background-image="url(./assets/bg.png)" data-footer=" " data-header="Aggregator" data-theme="jupiter" data-style="@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');" lang="en-US" style="--background-image:url(./assets/bg.png);--footer: ;--header:Aggregator;--theme:jupiter;--style:@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');;background-image:url(./assets/bg.png);background-position:center;background-repeat:no-repeat;background-size:cover;">
<header>Aggregator</header>

<h2 id="c-split-route">C. Split Route</h2>
<div class="route-pre-wrap">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>SOL -&gt; USDC  40% via Jupiter
SOL -&gt; USDC  35% via Raydium
SOL -&gt; USDT -&gt; USDC 25% via Meteora + Orca
</code></pre>
</div>
<p class="sub-text">大きい注文を複数の深い場所に分けると、1つのプールを深く押し込まずに済む。</p>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-background-image="url(./assets/bg.png)" data-footer=" " data-header="Aggregator" data-theme="jupiter" data-style="@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');" lang="en-US" style="--background-image:url(./assets/bg.png);--footer: ;--header:Aggregator;--theme:jupiter;--style:@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');;background-image:url(./assets/bg.png);background-position:center;background-repeat:no-repeat;background-size:cover;">
<header>Aggregator</header>

<h2 id="%E3%81%AA%E3%81%9C-multi-hop--split-route-%E3%81%8C%E8%B5%B7%E3%81%8D%E3%82%8B%E3%81%AE%E3%81%8B">なぜ Multi-hop / Split Route が起きるのか</h2>
<div class="split-route-grid">
<div class="amm-pool-card">
<h4>Multi-hop</h4>
<p>直接プールが浅いなら、中間トークン経由の複数プールの方が浅い範囲だけを使えることがある。</p>
</div>
<div class="amm-pool-card accent">
<h4>Split</h4>
<p>大口注文を複数プールへ分けると、1つの曲線を深く押し込まずに済む。</p>
</div>
</div>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-background-image="url(./assets/bg.png)" data-footer=" " data-class="section-divider" data-theme="jupiter" data-style="@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');" lang="en-US" class="section-divider" style="--background-image:url(./assets/bg.png);--footer: ;--class:section-divider;--theme:jupiter;--style:@import url('https://unpkg.com/tailwindcss@^2/dist/utilities.min.css');;background-image:url(./assets/bg.png);background-position:center;background-repeat:no-repeat;background-size:cover;">

<h2 id="perpetual-%E3%81%A8%E3%81%AF">Perpetual とは？</h2>
<div class="statement">
<p><strong>perp</strong> = <strong>Perpetual（永久）</strong> ＋ <strong>Future（先物）</strong></p>
</div>
<p class="sub-text">満期のない先物契約。<strong>証拠金・Funding・清算</strong>でポジションの状態が継続的に調整される。</p>
<footer> </footer>

<header>Perpetual</header>

<h2 id="%E5%85%88%E7%89%A9%E5%8F%96%E5%BC%95%E3%81%A8%E3%81%AF">「先物取引」とは？</h2>
<p class="lede-line">将来の決まった日時・条件で、あらかじめ決めた価格で売買する約束を、<strong>いまの時点で</strong>取り交わす取引。</p>
<div class="col-three">
<div>
<h4>何をするか</h4>
<p>「将来この価格で買う／売る」という<strong>契約</strong>を売買する。多くの市場で最終的には現物受け取りではなく、価格差の<strong>精算</strong>で決済される。</p>
</div>
<div>
<h4>なぜあるか</h4>
<p>農産物やエネルギーで生まれた「将来価格が読めない」リスクを<strong>ヘッジ</strong>するため。投資・投機で変動に乗る用途もある。</p>
</div>
<div>
<h4>レバレッジ</h4>
<p>証拠金の一部で大きなノーションに張れる。その分損益が拡大し、維持率を下回ると<strong>ロスカット</strong>で強制決済されうる。</p>
</div>
</div>
<footer> </footer>
</section>

<h2 id="%E5%B0%8F%E8%A9%B1%E6%AD%B4%E5%8F%B2">小話（歴史）</h2>
<p class="lede-line">米国の先物市場は <strong>1840年代のシカゴ</strong> ではじまった。</p>
<p class="narrative">シカゴは中西部の穀倉地帯の中央にあり、五大湖と鉄道で穀物を集積・配送する<strong>交通の要所</strong>だった。だから先物取引の中心地として発展した、とされている。</p>
